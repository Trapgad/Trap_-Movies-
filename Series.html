<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRAP SERIES | Binge-Worth TV</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-color: #e50914; 
            --bg-body: #0a0a0a;
            --bg-card: #1a1a1a;
            --text-main: #ffffff;
            --text-muted: #a3a3a3;
            --nav-height: 70px;
            --side-padding: 5%;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body { background-color: var(--bg-body); color: var(--text-main); overflow-x: hidden; }

        /* --- SHARED NAVBAR --- */
        .navbar {
            height: var(--nav-height);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 var(--side-padding);
            position: fixed; top: 0; width: 100%; z-index: 1000;
            background: rgba(10, 10, 10, 0.95); backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .logo { font-size: 1.4rem; font-weight: 800; color: var(--primary-color); text-decoration: none; }
        .logo span { color: white; }
        .nav-links { display: flex; gap: 20px; overflow-x: auto; scrollbar-width: none; }
        .nav-links a { text-decoration: none; color: var(--text-muted); font-size: 0.8rem; text-transform: uppercase; }
        .nav-links a.active { color: white; font-weight: 800; border-bottom: 2px solid var(--primary-color); }

        /* --- SERIES HEADER --- */
        .page-header {
            margin-top: calc(var(--nav-height) + 20px);
            padding: 40px var(--side-padding);
        }
        .page-header h1 { font-size: 2.5rem; margin-bottom: 10px; }

        /* --- GENRE PILLS (Flexible/Scrollable) --- */
        .genre-container {
            display: flex; gap: 12px; overflow-x: auto;
            padding: 10px 0 30px; scrollbar-width: none;
        }
        .genre-container::-webkit-scrollbar { display: none; }
        .genre-btn {
            padding: 8px 20px; background: var(--bg-card);
            border: 1px solid #333; border-radius: 20px;
            color: white; cursor: pointer; white-space: nowrap;
            transition: 0.3s; font-size: 0.85rem;
        }
        .genre-btn:hover, .genre-btn.active { background: var(--primary-color); border-color: var(--primary-color); }

        /* --- GRID --- */
        .main-container { padding: 0 var(--side-padding) 80px; }
        .movie-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px;
        }
        @media (min-width: 768px) { .movie-grid { grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 30px; } }

        .movie-card {
            background: var(--bg-card); border-radius: 12px;
            overflow: hidden; transition: 0.4s ease; cursor: pointer; position: relative;
        }
        .movie-card:hover { transform: scale(1.03); }
        .card-img { width: 100%; aspect-ratio: 2/3; object-fit: cover; display: block; }
        
        .card-overlay {
            position: absolute; bottom: 0; width: 100%; padding: 15px;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
        }

        /* --- MODAL --- */
        .modal {
            display: none; position: fixed; z-index: 2000; inset: 0;
            background: rgba(0,0,0,0.95); justify-content: center; align-items: center; padding: 20px;
        }
        .modal-content { width: 100%; max-width: 900px; position: relative; }
        .close { position: absolute; top: -45px; right: 0; color: white; font-size: 2.5rem; cursor: pointer; }

        footer { padding: 40px; text-align: center; color: var(--text-muted); border-top: 1px solid #222; font-size: 0.8rem; }
    </style>
</head>
<body>

    <header class="navbar">
        <a href="index.html" class="logo">TRAP<span>MOVIES</span></a>
        <nav class="nav-links">
            <a href="index.html">Home</a>
            <a href="Movies.html">Movies</a>
            <a href="Series.html" class="active">Series</a>
             <a href="About.html">About</a>
            <a href="Contact.html">Contact</a>            
        </nav>
    </header>

    <div class="page-header">
        <h1>Premium Series</h1>
        <div class="genre-container" id="genreList">
            <button class="genre-btn active" onclick="filterSeries('', this)">All Genres</button>
            <button class="genre-btn" onclick="filterSeries('10759', this)">Action & Adventure</button>
            <button class="genre-btn" onclick="filterSeries('18', this)">Drama</button>
            <button class="genre-btn" onclick="filterSeries('35', this)">Comedy</button>
            <button class="genre-btn" onclick="filterSeries('9648', this)">Mystery</button>
            <button class="genre-btn" onclick="filterSeries('10765', this)">Sci-Fi & Fantasy</button>
        </div>
    </div>

    <main class="main-container">
        <div class="movie-grid" id="seriesGrid">
            </div>
    </main>

    <div id="trailerModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <iframe id="trailerFrame" width="100%" height="500px" src="" frameborder="0" allowfullscreen></iframe>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 TRAP MOVIES — Series Collection</p>
    </footer>

    <script type="module">
        const TOKEN = "eyJhbGciOiJIUzI1NiJ9.eyJhdWQiOiIxN2ExODM0ZTI3MzMyMGVlZjhhMmEzNmIzOGExMTk2NCIsIm5iZiI6MTc2MDE5MDU2OC4wOTQsInN1YiI6IjY4ZWE2MDY4ZmJjYjQxOTVlYjlmZDg2ZCIsInNjb3BlcyI6WyJhcGlfcmVhZCJdLCJ2ZXJzaW9uIjoxfQ.iFV2N9KUPakJb_HWWY3eZbB3cUq_gMhM1H9hcnEWD7Q";
        const IMG_PATH = "https://image.tmdb.org/t/p/w500";
        const grid = document.getElementById('seriesGrid');

        async function fetchSeries(genreId = "") {
            let url = "https://api.themoviedb.org/3/trending/tv/week";
            if(genreId) {
                url = `https://api.themoviedb.org/3/discover/tv?with_genres=${genreId}&sort_by=popularity.desc`;
            }

            try {
                const res = await fetch(url, { headers: { Authorization: `Bearer ${TOKEN}` } });
                const data = await res.json();
                renderSeries(data.results);
            } catch (err) { console.error(err); }
        }

        function renderSeries(list) {
            grid.innerHTML = "";
            list.forEach(s => {
                const card = document.createElement('div');
                card.className = 'movie-card';
                card.innerHTML = `
                    <img src="${s.poster_path ? IMG_PATH + s.poster_path : 'https://via.placeholder.com/500x750'}" class="card-img">
                    <div class="card-overlay">
                        <div style="font-size:0.9rem; font-weight:bold;">${s.name}</div>
                        <div style="font-size:0.75rem; color:var(--primary-color);">★ ${s.vote_average.toFixed(1)}</div>
                    </div>
                `;
                card.onclick = () => openTrailer(s.id);
                grid.appendChild(card);
            });
        }

        // --- FILTER LOGIC ---
        window.filterSeries = (id, btn) => {
            document.querySelectorAll('.genre-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            fetchSeries(id);
        }

        async function openTrailer(id) {
            const res = await fetch(`https://api.themoviedb.org/3/tv/${id}/videos`, { headers: { Authorization: `Bearer ${TOKEN}` } });
            const data = await res.json();
            const trailer = data.results.find(v => v.type === "Trailer");
            if(trailer) {
                document.getElementById('trailerFrame').src = `https://www.youtube.com/embed/${trailer.key}?autoplay=1`;
                document.getElementById('trailerModal').style.display = "flex";
            }
        }

        document.querySelector('.close').onclick = () => {
            document.getElementById('trailerModal').style.display = "none";
            document.getElementById('trailerFrame').src = "";
        };

        fetchSeries();
    </script>
</body>
</html>
