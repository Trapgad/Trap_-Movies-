<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRAP MOVIES | Premium Library</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-color: #e50914; 
            --bg-body: #0a0a0a;
            --bg-card: #1a1a1a;
            --text-main: #ffffff;
            --text-muted: #a3a3a3;
            --nav-height: 70px;
            --side-padding: 5%;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body { background-color: var(--bg-body); color: var(--text-main); overflow-x: hidden; }

        /* --- SHARED NAVBAR (Original Style) --- */
        .navbar {
            height: var(--nav-height);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 var(--side-padding);
            position: fixed; top: 0; width: 100%; z-index: 1000;
            background: rgba(10, 10, 10, 0.95); backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .logo { font-size: 1.4rem; font-weight: 800; color: var(--primary-color); text-decoration: none; }
        .logo span { color: white; }
        .nav-links { display: flex; gap: 20px; overflow-x: auto; scrollbar-width: none; }
        .nav-links a { text-decoration: none; color: var(--text-muted); font-size: 0.8rem; text-transform: uppercase; }
        .nav-links a.active { color: white; font-weight: 800; border-bottom: 2px solid var(--primary-color); }

        /* --- HEADER & SEARCH --- */
        .page-header {
            margin-top: calc(var(--nav-height) + 20px);
            padding: 40px var(--side-padding) 10px;
        }
        .page-header h1 { font-size: 2.5rem; margin-bottom: 20px; }

        .search-container { margin-bottom: 30px; max-width: 500px; }
        #searchInput {
            width: 100%; padding: 12px 20px; border-radius: 8px; border: 1px solid #333;
            background: var(--bg-card); color: white; outline: none; transition: 0.3s;
        }
        #searchInput:focus { border-color: var(--primary-color); }

        /* --- CATEGORY SECTIONS --- */
        .category-section { margin-bottom: 50px; padding: 0 var(--side-padding); }
        .category-section h2 { 
            font-size: 1.1rem; margin-bottom: 20px; color: var(--text-muted); 
            text-transform: uppercase; letter-spacing: 1.5px; font-weight: 600;
        }

        .movie-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
        }
        @media (min-width: 768px) { .movie-grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 25px; } }

        .movie-card {
            background: var(--bg-card); border-radius: 10px;
            overflow: hidden; transition: 0.4s ease; cursor: pointer; position: relative;
        }
        .movie-card:hover { transform: scale(1.05); z-index: 5; }
        .card-img { width: 100%; aspect-ratio: 2/3; object-fit: cover; display: block; }
        
        .card-overlay {
            position: absolute; bottom: 0; width: 100%; padding: 12px;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
        }

        /* --- MODAL --- */
        .modal {
            display: none; position: fixed; z-index: 2000; inset: 0;
            background: rgba(0,0,0,0.95); justify-content: center; align-items: center; padding: 20px;
        }
        .modal-content { width: 100%; max-width: 900px; position: relative; }
        .close { position: absolute; top: -45px; right: 0; color: white; font-size: 2.5rem; cursor: pointer; }

        footer { padding: 40px; text-align: center; color: var(--text-muted); border-top: 1px solid #222; font-size: 0.8rem; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <header class="navbar">
        <a href="index.html" class="logo">TRAP<span>MOVIES</span></a>
        <nav class="nav-links">
            <a href="index.html">Home</a>
            <a href="Movies.html" class="active">Movies</a>
            <a href="Series.html">Series</a>
            <a href="About.html">About</a>
            <a href="Contact.html">Contact</a>
            <a href="Account.html">Account</a>
        </nav>
    </header>

    <div class="page-header">
        <h1>Premium Movies</h1>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Search by title...">
        </div>
    </div>

    <main class="main-container">
        <section id="historySection" class="category-section hidden">
            <h2>Continue Watching</h2>
            <div class="movie-grid" id="historyGrid"></div>
        </section>

        <section class="category-section">
            <h2 id="mainTitle">Trending This Week</h2>
            <div class="movie-grid" id="trendingGrid"></div>
        </section>

        <section class="category-section">
            <h2>Action & Adventure</h2>
            <div class="movie-grid" id="actionGrid"></div>
        </section>

        <section class="category-section">
            <h2>Comedy Hits</h2>
            <div class="movie-grid" id="comedyGrid"></div>
        </section>

        <section class="category-section">
            <h2>Horror & Thriller</h2>
            <div class="movie-grid" id="horrorGrid"></div>
        </section>

        <section class="category-section">
            <h2>Sci-Fi & Fantasy</h2>
            <div class="movie-grid" id="scifiGrid"></div>
        </section>

        <section class="category-section">
            <h2>Animation</h2>
            <div class="movie-grid" id="animeGrid"></div>
        </section>
    </main>

    <div id="trailerModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <iframe id="trailerFrame" width="100%" height="500px" src="" frameborder="0" allowfullscreen></iframe>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 TRAP MOVIES — Full Collection</p>
    </footer>

    <script type="module">
        const TOKEN = "eyJhbGciOiJIUzI1NiJ9.eyJhdWQiOiIxN2ExODM0ZTI3MzMyMGVlZjhhMmEzNmIzOGExMTk2NCIsIm5iZiI6MTc2MDE5MDU2OC4wOTQsInN1YiI6IjY4ZWE2MDY4ZmJjYjQxOTVlYjlmZDg2ZCIsInNjb3BlcyI6WyJhcGlfcmVhZCJdLCJ2ZXJzaW9uIjoxfQ.iFV2N9KUPakJb_HWWY3eZbB3cUq_gMhM1H9hcnEWD7Q";
        const IMG_PATH = "https://image.tmdb.org/t/p/w500";
        
        let history = JSON.parse(localStorage.getItem('trap_history')) || [];

        // Generic render function
        function renderMovies(list, gridId) {
            const grid = document.getElementById(gridId);
            grid.innerHTML = "";
            list.forEach(m => {
                const card = document.createElement('div');
                card.className = 'movie-card';
                card.innerHTML = `
                    <img src="${m.poster_path ? IMG_PATH + m.poster_path : 'https://via.placeholder.com/500x750'}" class="card-img" loading="lazy">
                    <div class="card-overlay">
                        <div style="font-size:0.85rem; font-weight:bold;">${m.title}</div>
                        <div style="font-size:0.75rem; color:var(--primary-color);">★ ${m.vote_average.toFixed(1)}</div>
                    </div>
                `;
                card.onclick = () => {
                    openTrailer(m.id);
                    saveToHistory(m);
                };
                grid.appendChild(card);
            });
        }

        // Fetching functions
        async function fetchMovies(url, gridId) {
            try {
                const res = await fetch(url, { headers: { Authorization: `Bearer ${TOKEN}` } });
                const data = await res.json();
                renderMovies(data.results, gridId);
            } catch (err) { console.error(err); }
        }

        async function openTrailer(id) {
            const res = await fetch(`https://api.themoviedb.org/3/movie/${id}/videos`, { headers: { Authorization: `Bearer ${TOKEN}` } });
            const data = await res.json();
            const trailer = data.results.find(v => v.type === "Trailer" && v.site === "YouTube");
            if(trailer) {
                document.getElementById('trailerFrame').src = `https://www.youtube.com/embed/${trailer.key}?autoplay=1`;
                document.getElementById('trailerModal').style.display = "flex";
            } else {
                alert("No trailer found for this title.");
            }
        }

        function saveToHistory(movie) {
            history = history.filter(m => m.id !== movie.id);
            history.unshift(movie);
            if(history.length > 6) history.pop();
            localStorage.setItem('trap_history', JSON.stringify(history));
            renderHistory();
        }

        function renderHistory() {
            const section = document.getElementById('historySection');
            if(history.length > 0) {
                section.classList.remove('hidden');
                renderMovies(history, 'historyGrid');
            }
        }

        // Search logic
        let timeout;
        document.getElementById('searchInput').oninput = (e) => {
            clearTimeout(timeout);
            const val = e.target.value.trim();
            timeout = setTimeout(() => {
                if(val) {
                    document.getElementById('mainTitle').innerText = `Results for "${val}"`;
                    fetchMovies(`https://api.themoviedb.org/3/search/movie?query=${encodeURIComponent(val)}`, 'trendingGrid');
                } else {
                    document.getElementById('mainTitle').innerText = "Trending This Week";
                    fetchMovies("https://api.themoviedb.org/3/trending/movie/week", "trendingGrid");
                }
            }, 500);
        };

        document.querySelector('.close').onclick = () => {
            document.getElementById('trailerModal').style.display = "none";
            document.getElementById('trailerFrame').src = "";
        };

        // --- INITIALIZE ALL GROUPS ---
        const discoverUrl = (id) => `https://api.themoviedb.org/3/discover/movie?with_genres=${id}&sort_by=popularity.desc`;

        renderHistory();
        fetchMovies("https://api.themoviedb.org/3/trending/movie/week", "trendingGrid"); // Group 2
        fetchMovies(discoverUrl(28), "actionGrid"); // Group 3
        fetchMovies(discoverUrl(35), "comedyGrid"); // Group 4
        fetchMovies(discoverUrl(27), "horrorGrid"); // Group 5
        fetchMovies(discoverUrl(878), "scifiGrid"); // Group 6
        fetchMovies(discoverUrl(16), "animeGrid");  // Group 7

    </script>
</body>
</html>
