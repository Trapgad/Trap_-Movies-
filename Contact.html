<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRAP MOVIES | Contact Us</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --accent: #E50914; 
            --bg-dark: #080808; 
            --bg-surface: #121212; 
            --border: rgba(255, 255, 255, 0.1); 
            --text-main: #FFFFFF; 
            --text-dim: #999999; 
            --transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1); 
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); padding-top: 100px; line-height: 1.6; }

        /* Header Navigation */
        .header { position: fixed; top: 0; width: 100%; z-index: 1000; padding: 1.2rem 6%; display: flex; justify-content: space-between; align-items: center; background: rgba(8, 8, 8, 0.95); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); }
        .logo { font-size: 1.5rem; font-weight: 800; text-transform: uppercase; letter-spacing: 3px; color: var(--text-main); text-decoration: none; }
        .logo span { color: var(--accent); }
        .nav-links { display: flex; gap: 1.5rem; list-style: none; }
        .nav-links a { text-decoration: none; color: var(--text-dim); font-size: 0.8rem; font-weight: 700; text-transform: uppercase; transition: var(--transition); }
        .nav-links a:hover, .nav-links a.active { color: white; border-bottom: 2px solid var(--accent); padding-bottom: 5px; }

        /* Main Container */
        .container { max-width: 1100px; margin: 4rem auto; padding: 0 6%; display: grid; grid-template-columns: 1fr 1.2fr; gap: 4rem; }
        .contact-info h1 { font-size: 4rem; font-weight: 800; margin-bottom: 1rem; line-height: 1.1; }
        .contact-info h1 span { color: var(--accent); }
        .info-card { background: rgba(255,255,255,0.03); border: 1px solid var(--border); padding: 1.5rem; border-radius: 20px; margin-bottom: 1rem; display: flex; align-items: center; gap: 15px; }
        .info-card i { color: var(--accent); font-size: 1.5rem; }

        /* Contact Card & Form */
        .contact-card { background: var(--bg-surface); padding: 3rem; border-radius: 30px; border: 1px solid var(--border); box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .form-group { margin-bottom: 1.5rem; }
        input, textarea { width: 100%; padding: 1.2rem; background: #1a1a1a; border: 1px solid var(--border); border-radius: 15px; color: white; font-size: 1rem; transition: var(--transition); }
        input:focus, textarea:focus { outline: none; border-color: var(--accent); background: #222; box-shadow: 0 0 15px rgba(229, 9, 20, 0.1); }
        
        .submit-btn { width: 100%; padding: 1.2rem; background: var(--accent); color: white; border: none; border-radius: 15px; font-weight: 800; text-transform: uppercase; cursor: pointer; transition: var(--transition); letter-spacing: 2px; }
        .submit-btn:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(229, 9, 20, 0.4); }
        .submit-btn:disabled { background: #444; cursor: not-allowed; transform: none; }

        /* Status Message */
        #result { margin-top: 1.5rem; text-align: center; font-weight: 600; padding: 1rem; border-radius: 10px; display: none; }

        @media (max-width: 850px) { .container { grid-template-columns: 1fr; } .contact-info h1 { font-size: 3rem; } }
    </style>
</head>
<body>

    <header class="header">
        <a href="index.html" class="logo">TRAP<span>MOVIES</span></a>
        <nav><ul class="nav-links">
            <li><a href="Home.html">Home</a></li>
            <li><a href="Movies.html">Movies</a></li>
            <li><a href="Series.html">Series</a></li>
            <li><a href="About.html">About</a></li>
            <li><a href="Contact.html" class="active">Contact</a></li>
        </ul></nav>
    </header>

    <main class="container">
        <div class="contact-info">
            <h1>Get in <br><span>Touch.</span></h1>
            <p style="color: var(--text-dim); margin-bottom: 2rem;">Have a movie request or business inquiry? The TRAP GAD team is ready to respond.</p>
            
            <div class="info-card"><i class="fas fa-envelope"></i> <div><p style="font-size: 0.7rem; color: var(--text-dim);">EMAIL</p><p>davidedemquarshie1@gmail.com</p></div></div>
            <div class="info-card"><i class="fas fa-phone"></i> <div><p style="font-size: 0.7rem; color: var(--text-dim);">WHATSAPP</p><p>+233 50 084 4575</p></div></div>
        </div>

        <div class="contact-card">
            <form action="https://api.web3forms.com/submit" method="POST" id="form">
                <input type="hidden" name="access_key" value="844a59d4-c5d1-455f-8f6f-b8126756afa2">
                
                <input type="checkbox" name="botcheck" class="hidden" style="display: none;">

                <div class="form-group">
                    <input type="text" name="name" placeholder="Your Full Name" required>
                </div>
                <div class="form-group">
                    <input type="email" name="email" placeholder="Email Address" required>
                </div>
                <div class="form-group">
                    <textarea name="message" placeholder="How can we help you today?" rows="5" required></textarea>
                </div>
                
                <button type="submit" class="submit-btn" id="btn">Send Message</button>
                <div id="result"></div>
            </form>
        </div>
    </main>

    <script>
        const form = document.getElementById('form');
        const result = document.getElementById('result');
        const btn = document.getElementById('btn');

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Loading State
            btn.innerHTML = "<i class='fas fa-spinner fa-spin'></i> SENDING...";
            btn.disabled = true;
            
            const formData = new FormData(form);
            const object = Object.fromEntries(formData);
            const json = JSON.stringify(object);

            result.style.display = "block";
            result.style.background = "rgba(255,255,255,0.05)";
            result.style.color = "white";
            result.innerHTML = "Processing your request...";

            fetch('https://api.web3forms.com/submit', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: json
                })
                .then(async (response) => {
                    let json = await response.json();
                    if (response.status == 200) {
                        result.style.background = "rgba(75, 181, 67, 0.1)";
                        result.style.color = "#4BB543";
                        result.innerHTML = "✅ Success! We have received your message.";
                        form.reset();
                    } else {
                        result.style.background = "rgba(229, 9, 20, 0.1)";
                        result.style.color = "#E50914";
                        result.innerHTML = "❌ Error: " + json.message;
                    }
                })
                .catch(error => {
                    result.innerHTML = "Something went wrong. Please try again later.";
                })
                .then(function() {
                    btn.innerHTML = "Send Message";
                    btn.disabled = false;
                    // Auto-hide the message after 6 seconds
                    setTimeout(() => { result.style.display = "none"; }, 6000);
                });
        });
    </script>
</body>
</html>
