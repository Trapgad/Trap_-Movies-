<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRAP MOVIES | Contact Us</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --accent: #E50914;
            --bg-dark: #080808;
            --bg-surface: #121212;
            --border: rgba(255, 255, 255, 0.1);
            --text-main: #FFFFFF;
            --text-dim: #999999;
            --transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            padding-top: 100px;
            line-height: 1.6;
        }

        /* --- NAVIGATION --- */
        .header {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            padding: 1.2rem 6%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(8, 8, 8, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--text-main);
            text-decoration: none;
        }
        .logo span { color: var(--accent); }

        .nav-links {
            display: flex;
            gap: 1.5rem;
            list-style: none;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-dim);
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            transition: var(--transition);
            padding-bottom: 5px;
        }

        .nav-links a:hover, .nav-links a.active { 
            color: white; 
            border-bottom: 2px solid var(--accent);
        }

        /* --- CONTACT CONTENT --- */
        .container {
            max-width: 1000px;
            margin: 4rem auto;
            padding: 0 6%;
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 4rem;
        }

        .contact-info h1 {
            font-size: 3.5rem;
            font-weight: 800;
            margin-bottom: 1.5rem;
            line-height: 1.1;
        }
        .contact-info h1 span { color: var(--accent); }

        .info-item {
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 15px;
            color: var(--text-dim);
        }

        .info-item i { color: var(--accent); font-size: 1.2rem; width: 25px; }
        .info-item span { color: white; font-weight: 600; }

        .contact-card {
            background: var(--bg-surface);
            padding: 3rem;
            border-radius: 24px;
            border: 1px solid var(--border);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .form-group { margin-bottom: 1.5rem; }

        input, textarea {
            width: 100%;
            padding: 1.2rem;
            background: #1a1a1a;
            border: 1px solid var(--border);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            transition: var(--transition);
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--accent);
            background: #222;
        }

        .submit-btn {
            width: 100%;
            padding: 1.2rem;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
            transition: var(--transition);
            letter-spacing: 1px;
        }

        .submit-btn:hover { 
            transform: translateY(-3px); 
            box-shadow: 0 10px 20px rgba(229, 9, 20, 0.4); 
        }

        .submit-btn:disabled {
            background: #555;
            cursor: not-allowed;
            transform: none;
        }

        /* --- MOBILE ADJUSTMENTS --- */
        @media (max-width: 850px) {
            .container { grid-template-columns: 1fr; gap: 2rem; }
            .contact-info h1 { font-size: 2.5rem; }
            .contact-card { padding: 2rem; }
        }
    </style>
</head>
<body>

    <header class="header">
        <a href="index.html" class="logo">TRAP<span>MOVIES</span></a>
        <nav>
            <ul class="nav-links">
                <li><a href="Home.html">Home</a></li>
                <li><a href="Movies.html">Movies</a></li>
                <li><a href="Series.html">Series</a></li>
                <li><a href="About.html">About</a></li>
                <li><a href="Contact.html" class="active">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <div class="contact-info">
            <h1>Get in <br><span>Touch.</span></h1>
            <p style="color: var(--text-dim); margin-bottom: 2rem; font-size: 1.1rem;">
                Have a request or a question? Send a message to TRAP GAD.
            </p>
            <div class="info-item">
                <i class="fas fa-envelope"></i> 
                <p>Email: <span>davidedemquarshie1@gmail.com</span></p>
            </div>
            <div class="info-item">
                <i class="fas fa-phone"></i> 
                <p>Phone: <span>0500844575</span></p>
            </div>
        </div>

        <div class="contact-card">
            <form id="contactForm">
                <div class="form-group">
                    <input type="text" name="name" placeholder="Full Name" required>
                </div>
                <div class="form-group">
                    <input type="email" name="email" placeholder="Email Address" required>
                </div>
                <div class="form-group">
                    <textarea name="message" placeholder="Your Message" rows="5" required></textarea>
                </div>
                <button type="submit" id="submitBtn" class="submit-btn">Send Message</button>
            </form>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-analytics-compat.js"></script>

    <script>
        // 1. INITIALIZE FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyBLHlSlMPvwSS5MB8JqG2JB1R-ANIopQZU",
            authDomain: "trap-270792.firebaseapp.com",
            projectId: "trap-270792",
            storageBucket: "trap-270792.firebasestorage.app",
            messagingSenderId: "248838190395",
            appId: "1:248838190395:web:0dd11c0e4427f79470331e",
            measurementId: "G-PG6GXVVKL9"
        };
        firebase.initializeApp(firebaseConfig);
        const analytics = firebase.analytics();

        // 2. INITIALIZE EMAILJS
        (function(){ 
            emailjs.init("nxHZMBsHUE7DW8m50"); 
        })();

        // 3. FORM SUBMISSION LOGIC
        const contactForm = document.getElementById("contactForm");
        const btn = document.getElementById("submitBtn");

        contactForm.addEventListener("submit", function(event) {
            event.preventDefault();
            
            btn.innerHTML = "Sending...";
            btn.disabled = true;

            // Use your confirmed Service ID and Template ID
            emailjs.sendForm("service_3arrlko", "template_6spwewd", this)
                .then(() => {
                    alert("✅ Success! Your message has been sent.");
                    
                    // Log the success to Firebase Analytics
                    analytics.logEvent('contact_form_success');
                    
                    contactForm.reset();
                    btn.innerHTML = "Send Message";
                    btn.disabled = false;
                }, (error) => {
                    console.error("EmailJS Error:", error);
                    alert("❌ Failed to send. Check your connection or Service ID.");
                    btn.innerHTML = "Send Message";
                    btn.disabled = false;
                });
        });
    </script>
</body>
</html>
