<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRAP MOVIES | Premium Streaming</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-color: #e50914; 
            --bg-body: #0a0a0a;
            --bg-card: #1a1a1a;
            --text-main: #ffffff;
            --text-muted: #a3a3a3;
            --nav-height: 70px;
            --side-padding: 5%;
        }

        @media (min-width: 1440px) { :root { --side-padding: 10%; } }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* --- NAVIGATION --- */
        .navbar {
            height: var(--nav-height);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 var(--side-padding);
            position: fixed;
            top: 0; width: 100%; z-index: 1000;
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .logo { font-size: 1.4rem; font-weight: 800; color: var(--primary-color); text-decoration: none; flex-shrink: 0; }
        .logo span { color: white; }

        .nav-links { 
            display: flex; 
            list-style: none; 
            gap: 20px; 
            overflow-x: auto; 
            scrollbar-width: none;
            padding: 0 10px;
        }
        .nav-links::-webkit-scrollbar { display: none; }
        .nav-links a { text-decoration: none; color: var(--text-muted); font-weight: 500; font-size: 0.8rem; text-transform: uppercase; transition: 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: white; }

        /* --- HERO: ANIMATED AD SERIES --- */
        .hero {
            height: 75vh;
            min-height: 500px;
            position: relative;
            display: flex;
            align-items: center;
            padding: 0 var(--side-padding);
            overflow: hidden;
        }

        /* The Background Slider */
        .hero-bg-step {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0;
            animation: imageFade 15s infinite;
            z-index: -2;
        }

        /* Overlay to make text readable */
        .hero::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to right, rgba(0,0,0,0.9) 20%, rgba(0,0,0,0.4) 100%),
                        linear-gradient(to top, var(--bg-body) 0%, transparent 30%);
            z-index: -1;
        }

        /* Ad Images */
        .bg1 { background-image: url('https://images.unsplash.com/photo-1626814026160-2237a95fc5a0?q=80&w=2070'); animation-delay: 0s; }
        .bg2 { background-image: url('https://images.unsplash.com/photo-1536440136628-849c177e76a1?q=80&w=1925'); animation-delay: 5s; }
        .bg3 { background-image: url('https://images.unsplash.com/photo-1485846234645-a62644f84728?q=80&w=2059'); animation-delay: 10s; }

        @keyframes imageFade {
            0% { opacity: 0; }
            10% { opacity: 1; }
            33% { opacity: 1; }
            43% { opacity: 0; }
            100% { opacity: 0; }
        }

        .hero-content { max-width: 650px; position: relative; z-index: 10; }
        .hero-content h1 { font-size: clamp(2.2rem, 8vw, 4rem); font-weight: 800; line-height: 1.1; margin-bottom: 20px; }

        /* --- SEARCH & GRID --- */
        .search-container { padding: 30px var(--side-padding); display: flex; justify-content: center; }
        #searchInput {
            width: 100%; max-width: 600px;
            padding: 14px 25px;
            background: var(--bg-card);
            border: 1px solid #333;
            border-radius: 50px;
            color: white; outline: none; transition: 0.3s;
        }
        #searchInput:focus { border-color: var(--primary-color); }

        .main-container { padding: 0 var(--side-padding) 80px; }
        .movie-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px;
        }

        @media (min-width: 768px) {
            .movie-grid { grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 30px; }
        }

        .movie-card {
            background: var(--bg-card);
            border-radius: 12px;
            overflow: hidden;
            transition: 0.4s ease;
            cursor: pointer;
            position: relative;
        }
        .movie-card:hover { transform: translateY(-10px); }

        .card-img { width: 100%; aspect-ratio: 2/3; object-fit: cover; display: block; }
        .card-overlay {
            position: absolute; bottom: 0; width: 100%; padding: 15px;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
        }

        .btn-main { background: var(--primary-color); color: white; padding: 12px 28px; border-radius: 6px; text-decoration: none; font-weight: bold; border: none; cursor: pointer; }

        /* --- MODAL --- */
        .modal {
            display: none; position: fixed; z-index: 2000; inset: 0;
            background: rgba(0,0,0,0.95); justify-content: center; align-items: center; padding: 20px;
        }
        .modal-content { width: 100%; max-width: 900px; position: relative; }
        .close { position: absolute; top: -45px; right: 0; color: white; font-size: 2.5rem; cursor: pointer; }

        footer { padding: 60px; text-align: center; color: var(--text-muted); border-top: 1px solid #222; font-size: 0.8rem; }
    </style>
</head>
<body>

    <header class="navbar">
        <a href="index.html" class="logo">TRAP<span>MOVIES</span></a>
        <nav class="nav-links">
            <a href="index.html" class="active">Home</a>
            <a href="Movies.html">Movies</a>
            <a href="Series.html">Series</a>
            <a href="About.html">About</a>
            <a href="Contact.html">Contact</a>
            <a href="Account.html">Account</a>
        </nav>
        <div class="nav-actions">
            <span id="authSection">
                <a href="signin.html" style="color:white; text-decoration:none; margin-right:15px; font-size:0.85rem;">Sign In</a>
                <a href="signup.html" class="btn-main" style="padding: 8px 18px; font-size:0.85rem;">Join</a>
            </span>
            <button id="logoutBtn" class="btn-main" style="display:none; padding: 8px 18px;">Logout</button>
        </div>
    </header>

    <section class="hero">
        <div class="hero-bg-step bg1"></div>
        <div class="hero-bg-step bg2"></div>
        <div class="hero-bg-step bg3"></div>

        <div class="hero-content">
            <h1>Unlimited Cinema. <br>Anywhere.</h1>
            <p style="color: var(--text-muted); margin-bottom: 25px; font-size: 1.1rem;">Watch the latest ads and blockbusters. Join TRAP MOVIES for the ultimate premium experience.</p>
            <a href="#movies" class="btn-main" style="padding: 15px 35px;">Browse Library</a>
        </div>
    </section>

    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Search for movies, actors or ads...">
    </div>

    <main class="main-container" id="movies">
        <h2 style="margin-bottom: 25px; font-size: 1.5rem;">Trending Content</h2>
        <div class="movie-grid" id="movieGrid"></div>
    </main>

    <div id="trailerModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <iframe id="trailerFrame" width="100%" height="500px" src="" frameborder="0" allowfullscreen></iframe>
        </div>
    </div>

    <footer>
        <p>&copy; 2025 TRAP MOVIES — Built with 🔥 by TRAP GAD</p>
    </footer>

    <script type="module">
        const TOKEN = "eyJhbGciOiJIUzI1NiJ9.eyJhdWQiOiIxN2ExODM0ZTI3MzMyMGVlZjhhMmEzNmIzOGExMTk2NCIsIm5iZiI6MTc2MDE5MDU2OC4wOTQsInN1YiI6IjY4ZWE2MDY4ZmJjYjQxOTVlYjlmZDg2ZCIsInNjb3BlcyI6WyJhcGlfcmVhZCJdLCJ2ZXJzaW9uIjoxfQ.iFV2N9KUPakJb_HWWY3eZbB3cUq_gMhM1H9hcnEWD7Q";
        const IMG_PATH = "https://image.tmdb.org/t/p/w500";
        const grid = document.getElementById('movieGrid');
        const searchInput = document.getElementById('searchInput');

        async function fetchMovies(url = "https://api.themoviedb.org/3/trending/movie/week") {
            try {
                const res = await fetch(url, { headers: { Authorization: `Bearer ${TOKEN}` } });
                const data = await res.json();
                renderMovies(data.results);
            } catch (err) { console.error(err); }
        }

        function renderMovies(movies) {
            grid.innerHTML = "";
            movies.forEach(m => {
                const card = document.createElement('div');
                card.className = 'movie-card';
                card.innerHTML = `<img src="${m.poster_path ? IMG_PATH + m.poster_path : 'https://via.placeholder.com/500x750'}" class="card-img">
                    <div class="card-overlay">
                        <div class="card-title" style="font-size:0.9rem; font-weight:bold;">${m.title}</div>
                        <div style="font-size:0.75rem; color:var(--primary-color);">${m.release_date?.split('-')[0]}</div>
                    </div>`;
                card.onclick = () => openTrailer(m.id);
                grid.appendChild(card);
            });
        }

        searchInput.onkeyup = (e) => {
            const query = e.target.value.trim();
            if(query) fetchMovies(`https://api.themoviedb.org/3/search/movie?query=${query}`);
            else fetchMovies();
        };

        async function openTrailer(id) {
            const res = await fetch(`https://api.themoviedb.org/3/movie/${id}/videos`, { headers: { Authorization: `Bearer ${TOKEN}` } });
            const data = await res.json();
            const trailer = data.results.find(v => v.type === "Trailer" && v.site === "YouTube");
            if(trailer) {
                document.getElementById('trailerFrame').src = `https://www.youtube.com/embed/${trailer.key}?autoplay=1`;
                document.getElementById('trailerModal').style.display = "flex";
                document.body.style.overflow = "hidden";
            }
        }

        document.querySelector('.close').onclick = () => {
            document.getElementById('trailerModal').style.display = "none";
            document.getElementById('trailerFrame').src = "";
            document.body.style.overflow = "auto";
        };

        fetchMovies();
    </script>
</body>
</html>
