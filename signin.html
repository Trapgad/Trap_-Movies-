<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRAP MOVIES | Sign In</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --accent: #E50914;
            --bg-dark: #080808;
            --bg-surface: #121212;
            --border: rgba(255, 255, 255, 0.1);
            --text-main: #FFFFFF;
            --text-dim: #999999;
            --transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* --- NAVIGATION --- */
        .header {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            padding: 1.2rem 6%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(8, 8, 8, 0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--text-main);
            text-decoration: none;
        }
        .logo span { color: var(--accent); }

        /* --- FORM CONTAINER --- */
        .signin-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 100px 20px 40px;
        }

        .container {
            width: 100%;
            max-width: 420px;
            background: var(--bg-surface);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid var(--border);
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .container h2 {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 2rem;
        }

        .form-group { position: relative; margin-bottom: 20px; text-align: left; }
        
        input {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: #1a1a1a;
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: var(--transition);
        }

        input:focus { border-color: var(--accent); }
        
        label {
            position: absolute;
            left: 16px;
            top: 16px;
            color: var(--text-dim);
            pointer-events: none;
            transition: 0.3s;
            background: #1a1a1a;
            padding: 0 5px;
        }

        input:focus + label,
        input:not(:placeholder-shown) + label {
            top: -10px;
            font-size: 0.75rem;
            color: var(--accent);
            font-weight: 700;
        }

        .primary-btn {
            width: 100%;
            padding: 16px;
            background: var(--accent);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 10px;
        }

        .primary-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(229, 9, 20, 0.3);
        }

        .google-btn {
            width: 100%;
            padding: 14px;
            margin-top: 12px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-main);
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            transition: var(--transition);
        }

        .google-btn:hover { background: rgba(255,255,255,0.05); }

        .signup-link { margin-top: 25px; font-size: 0.9rem; color: var(--text-dim); }
        .signup-link a { color: var(--accent); text-decoration: none; font-weight: 700; }

    </style>
</head>
<body>

    <header class="header">
        <a href="index.html" class="logo">TRAP<span>MOVIES</span></a>
    </header>

    <div class="signin-wrapper">
        <div class="container">
            <h2><i class="fas fa-sign-in-alt"></i> Sign In</h2>

            <form id="loginForm">
                <div class="form-group">
                    <input id="email" type="email" placeholder=" " required>
                    <label for="email">Email Address</label>
                </div>

                <div class="form-group">
                    <input id="password" type="password" placeholder=" " required>
                    <label for="password">Password</label>
                </div>

                <button type="submit" id="loginBtn" class="primary-btn">Sign In</button>
            </form>

            <button class="google-btn" id="googleBtn">
                <i class="fab fa-google"></i> Continue with Google
            </button>
            
            <div class="signup-link">
                New to TRAP MOVIES? <a href="signup.html">Sign Up Now</a>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBLHlSlMPvwSS5MB8JqG2JB1R-ANIopQZU",
            authDomain: "trap-270792.firebaseapp.com",
            projectId: "trap-270792",
            storageBucket: "trap-270792.appspot.com",
            messagingSenderId: "248838190395",
            appId: "1:248838190395:web:0dd11c0e4427f79470331e",
            measurementId: "G-PG6GXVVKL9"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        // --- EMAIL LOGIN ---
        const loginForm = document.getElementById("loginForm");
        loginForm.addEventListener("submit", (e) => {
            e.preventDefault();
            const email = document.getElementById("email").value;
            const pass = document.getElementById("password").value;
            const btn = document.getElementById("loginBtn");

            btn.disabled = true;
            btn.innerText = "Authenticating...";

            signInWithEmailAndPassword(auth, email, pass)
                .then(() => {
                    window.location.href = "Home.html";
                })
                .catch(err => {
                    alert("❌ Login Failed: " + err.message);
                    btn.disabled = false;
                    btn.innerText = "Sign In";
                });
        });

        // --- GOOGLE LOGIN ---
        document.getElementById("googleBtn").addEventListener("click", () => {
            signInWithPopup(auth, provider)
                .then(() => {
                    window.location.href = "Home.html";
                })
                .catch(err => {
                    if(err.code !== 'auth/popup-closed-by-user') {
                        alert("❌ Google Error: " + err.message);
                    }
                });
        });
    </script>
</body>
</html>
