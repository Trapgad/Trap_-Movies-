<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | TRAP MOVIES</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --accent: #E50914;
            --bg-dark: #080808;
            --bg-surface: #121212;
            --border: rgba(255, 255, 255, 0.1);
            --text-main: #FFFFFF;
            --text-dim: #999999;
            --transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* --- NAVIGATION --- */
        .header {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            padding: 1.2rem 6%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(8, 8, 8, 0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--text-main);
            text-decoration: none;
        }
        .logo span { color: var(--accent); }

        .nav-links {
            display: flex;
            gap: 1.5rem;
            list-style: none;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-dim);
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            transition: var(--transition);
        }

        .nav-links a:hover, .nav-links a.active { 
            color: white; 
            border-bottom: 2px solid var(--accent);
        }

        /* --- LOGIN CONTAINER --- */
        .login-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 100px 20px 40px;
        }

        .container {
            width: 100%;
            max-width: 400px;
            background: var(--bg-surface);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid var(--border);
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .container h2 {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 2rem;
        }

        /* --- INPUTS --- */
        .form-group { position: relative; margin-bottom: 20px; text-align: left; }
        
        input {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: #1a1a1a;
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: var(--transition);
        }

        input:focus { border-color: var(--accent); }
        
        label {
            position: absolute;
            left: 16px;
            top: 16px;
            color: var(--text-dim);
            pointer-events: none;
            transition: 0.3s;
            background: #1a1a1a;
            padding: 0 5px;
        }

        input:focus + label,
        input:not(:placeholder-shown) + label {
            top: -10px;
            font-size: 0.75rem;
            color: var(--accent);
            font-weight: 700;
        }

        /* --- BUTTONS --- */
        .primary-btn {
            width: 100%;
            padding: 16px;
            background: var(--accent);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
            transition: var(--transition);
        }

        .primary-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(229, 9, 20, 0.3);
        }

        .google-btn {
            width: 100%;
            padding: 14px;
            margin-top: 12px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-main);
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            transition: var(--transition);
        }

        .google-btn:hover { background: rgba(255,255,255,0.05); }

        .links-wrap {
            margin-top: 20px;
            font-size: 0.9rem;
            color: var(--text-dim);
        }

        .links-wrap a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
        }

        @media (max-width: 768px) {
            .nav-links { display: none; }
        }
    </style>
</head>
<body>

    <header class="header">
        <a href="index.html" class="logo">TRAP<span>MOVIES</span></a>
        <nav>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="movies.html">Movies</a></li>
                <li><a href="series.html">Series</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="account.html" class="active">Account</a></li>
            </ul>
        </nav>
    </header>

    <div class="login-wrapper">
        <div class="container">
            <h2>Welcome Back</h2>

            <div class="form-group">
                <input id="email" type="email" placeholder=" " required>
                <label for="email">Email</label>
            </div>

            <div class="form-group">
                <input id="password" type="password" placeholder=" " required>
                <label for="password">Password</label>
            </div>

            <button id="loginBtn" class="primary-btn">Sign In</button>
            <button class="google-btn"><i class="fab fa-google"></i> Continue with Google</button>

            <div class="links-wrap">
                <p><a href="#" id="forgotPassword">Forgot password?</a></p>
                <p style="margin-top: 10px;">New here? <a href="signup.html">Create Account</a></p>
            </div>
        </div>
    </div>

    <script type="module">
        // [Keep your existing Firebase config and logic here]
    </script>

</body>
</html>
