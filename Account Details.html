<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account | TRAP MOVIES</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary-color: #e50914; 
            --bg-body: #0a0a0a;
            --bg-card: #141414;
            --text-main: #ffffff;
            --text-muted: #a3a3a3;
            --nav-height: 70px;
            --side-padding: 5%;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body { 
            background-color: var(--bg-body); 
            color: var(--text-main); 
            overflow-x: hidden; 
        }

        /* --- MOVEABLE/SWIPEABLE NAVBAR --- */
        .navbar {
            height: var(--nav-height);
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            padding: 0 var(--side-padding);
            position: fixed; top: 0; width: 100%; z-index: 1000;
            background: rgba(10, 10, 10, 0.95); 
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .logo { 
            font-size: 1.4rem; 
            font-weight: 800; 
            color: var(--primary-color); 
            text-decoration: none; 
            flex-shrink: 0; /* Keeps logo from squishing */
            margin-right: 15px;
        }
        .logo span { color: white; }

        .nav-links { 
            display: flex; 
            gap: 20px; 
            list-style: none; 
            align-items: center;
            overflow-x: auto; /* Enable horizontal movement */
            white-space: nowrap; /* Keep links in one line */
            scrollbar-width: none; /* Hide scrollbar for Firefox */
            -ms-overflow-style: none; /* Hide scrollbar for IE */
            padding: 10px 0;
        }
        .nav-links::-webkit-scrollbar { display: none; } /* Hide scrollbar for Chrome/Safari */

        .nav-links a { 
            text-decoration: none; 
            color: var(--text-muted); 
            font-size: 0.75rem; 
            text-transform: uppercase; 
            font-weight: 700; 
            transition: 0.3s;
            flex-shrink: 0;
        }
        .nav-links a.active, .nav-links a:hover { 
            color: white; 
            border-bottom: 2px solid var(--primary-color); 
        }

        /* --- ACCOUNT SECTION --- */
        .content-wrapper {
            margin-top: calc(var(--nav-height) + 50px);
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .account-card {
            background: var(--bg-card);
            padding: 40px;
            border-radius: 12px;
            width: 100%;
            max-width: 450px;
            text-align: center;
            border: 1px solid #222;
        }

        .profile-section {
            position: relative;
            display: inline-block;
            margin-bottom: 25px;
        }
        #profilePic {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--primary-color);
        }
        .change-photo-btn {
            display: block;
            margin-top: 15px;
            cursor: pointer;
            background: #222;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 12px;
            color: var(--text-muted);
            border: 1px solid #333;
            transition: 0.3s;
        }
        .change-photo-btn:hover { background: var(--primary-color); color: white; }

        .user-info-row {
            background: rgba(255,255,255,0.02);
            padding: 15px;
            margin: 8px 0;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.85rem;
            text-align: left;
        }
        .user-info-row i { color: var(--primary-color); width: 20px; }

        .btn-signout {
            width: 100%;
            padding: 15px;
            background: var(--primary-color);
            border: none;
            color: white;
            font-size: 0.9rem;
            font-weight: 800;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 25px;
            transition: 0.3s;
        }
        .btn-signout:hover { background: #b20710; transform: translateY(-2px); }

        footer { text-align: center; padding: 40px; color: #444; font-size: 0.75rem; }
        footer span { color: var(--primary-color); }
    </style>
</head>
<body>

<header class="navbar">
    <a href="index.html" class="logo">TRAP<span>MOVIES</span></a>
    <nav class="nav-links">
        <a href="index.html">Home</a>
        <a href="Movies.html">Movies</a>
        <a href="Series.html">Series</a>
        <a href="About.html">About</a>
        <a href="Contact.html">Contact</a>
        <a href="Account.html" class="active">Account</a>
    </nav>
</header>

<div class="content-wrapper">
    <div class="account-card">
        <h2 id="userName">User Account</h2>
        
        <div class="profile-section">
            <img id="profilePic" src="https://i.imgur.com/6VBx3io.png" alt="Profile">
            <label for="imgUpload" class="change-photo-btn">
                <i class="fas fa-camera"></i> Change Avatar
            </label>
            <input type="file" id="imgUpload" accept="image/*" style="display:none;">
        </div>

        <div id="infoDisplay">
            <p style="color:#555">Loading secure data...</p>
        </div>
        
        <button class="btn-signout" id="logoutBtn">SIGN OUT</button>
    </div>
</div>

<footer>© 2026 <span>TRAP MOVIES</span> — Created by <span>TRAP GAD</span> 🔥</footer>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-auth.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-storage.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBLHlSlMPvwSS5MB8JqG2JB1R-ANIopQZU",
        authDomain: "trap-270792.firebaseapp.com",
        projectId: "trap-270792",
        storageBucket: "trap-270792.appspot.com",
        messagingSenderId: "248838190395",
        appId: "1:248838190395:web:0dd11c0e4427f79470331e"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const storage = getStorage(app);

    onAuthStateChanged(auth, async (user) => {
        if (!user) {
            window.location.href = "signin.html";
            return;
        }

        document.getElementById("userName").innerText = user.displayName || "Member";

        // Fetch custom profile pic
        try {
            const picRef = ref(storage, `profilePics/${user.uid}.jpg`);
            const url = await getDownloadURL(picRef);
            document.getElementById("profilePic").src = url;
        } catch (e) {
            document.getElementById("profilePic").src = user.photoURL || "https://i.imgur.com/6VBx3io.png";
        }

        // Display Data
        document.getElementById("infoDisplay").innerHTML = `
            <div class="user-info-row"><i class="fas fa-envelope"></i> ${user.email}</div>
            <div class="user-info-row"><i class="fas fa-fingerprint"></i> ID: ${user.uid.substring(0,8)}...</div>
            <div class="user-info-row"><i class="fas fa-crown"></i> Trap Premium Member</div>
        `;

        // Upload functionality
        document.getElementById("imgUpload").onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const btn = document.querySelector(".change-photo-btn");
            btn.innerText = "Syncing...";
            
            try {
                const picRef = ref(storage, `profilePics/${user.uid}.jpg`);
                await uploadBytes(picRef, file);
                const url = await getDownloadURL(picRef);
                document.getElementById("profilePic").src = url;
                alert("Avatar updated!");
            } catch (err) {
                alert("Upload failed. Check Firebase Storage rules.");
            } finally {
                btn.innerHTML = '<i class="fas fa-camera"></i> Change Avatar';
            }
        };
    });

    document.getElementById("logoutBtn").onclick = () => {
        signOut(auth).then(() => { window.location.href = "signin.html"; });
    };
</script>

</body>
</html>
